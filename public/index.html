<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bundling App v1.0.6</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #f5f5f5;
        color: #333;
      }

      .tab-bar {
        display: flex;
        background-color: #2c2c2c;
        padding: 8px 12px 0;
        gap: 4px;
      }

      .tab-bar button {
        background: #444;
        color: #ccc;
        border: none;
        padding: 8px 16px;
        border-radius: 6px 6px 0 0;
        cursor: pointer;
        font-size: 14px;
      }

      .tab-bar button.active {
        background: #f5f5f5;
        color: #333;
        font-weight: 600;
      }

      .tab-content {
        padding: 24px;
      }

      input, select {
        display: block;
        width: 100%;
        padding: 8px 10px;
        margin-top: 4px;
        margin-bottom: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
      }

      label {
        font-size: 13px;
        font-weight: 500;
        color: #555;
      }

      button.btn {
        padding: 8px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        margin-right: 8px;
      }

      button.btn-primary {
        background-color: #2c7be5;
        color: white;
      }

      button.btn-secondary {
        background-color: #ddd;
        color: #333;
      }

      button.btn-danger {
        background-color: #e53e3e;
        color: white;
      }

      .list-item {
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 14px 16px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .list-item-title {
        font-weight: 600;
        font-size: 15px;
      }

      .list-item-sub {
        font-size: 13px;
        color: #666;
        margin-top: 4px;
      }

      .snackbar {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: white;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }

      .snackbar.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="snackbar" id="snackbar"></div>
  </body>
</html>
